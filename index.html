<!doctype html>
<html>
	<head>
		<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
		<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
	</head>

	<body style="margin: 0; overflow: hidden; touch-action: none;">
		<a-scene
				vr-mode-ui="enabled: false;"
				loading-screen="enabled: false;"
				arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
				id="scene"
				embedded
		>
		<a-assets>
				<img id="png-asset" src="assets/asset.png">
		</a-assets>

		<a-marker
				id="animated-marker"
				type="pattern"
				preset="custom"
				url="assets/marker.patt"
				raycaster="objects: .clickable"
				emitevents="true"
				cursor="fuse: false; rayOrigin: mouse;"
		>
			<a-image
					id="ar-image"
					src="#png-asset"
					class="clickable"
					rotation="-90 0 0"
					keep-image-aspect
					pinch-zoom="min: 0.3; max: 5"
			></a-image>
		</a-marker>

		<a-entity camera></a-entity>
			</a-scene>

		<script>
				AFRAME.registerComponent('keep-image-aspect', {
						init: function () {
								const el = this.el;
								const src = el.getAttribute('src');

								let img;

								if (src && src.startsWith('#')) {
										img = document.querySelector(src);
								} else {
										img = new Image();
										img.src = src;
								}

								const applyAspect = () => {
										const width = img.naturalWidth;
										const height = img.naturalHeight;

										if (!width || !height) return;

										const aspect = width / height;

										el.setAttribute('height', 1);
										el.setAttribute('width', aspect);

										el.setAttribute('scale', '1 1 1');
								};

								if (img.complete) {
										applyAspect();
								} else {
										img.addEventListener('load', applyAspect);
								}
						}
				});

				AFRAME.registerComponent('pinch-zoom', {
						schema: {
								min: { type: 'number', default: 0.3 },
								max: { type: 'number', default: 5 }
						},

						init: function () {
								this.initialDistance = null;
								this.initialScale = null;

								const sceneEl = this.el.sceneEl;

								const getDistance = (touches) => {
										const dx = touches[0].clientX - touches[1].clientX;
										const dy = touches[0].clientY - touches[1].clientY;
										return Math.sqrt(dx * dx + dy * dy);
								};

								sceneEl.addEventListener('touchstart', (event) => {
										if (event.touches.length !== 2) return;

										this.initialDistance = getDistance(event.touches);
										this.initialScale = this.el.object3D.scale.clone();
								}, { passive: false });

								sceneEl.addEventListener('touchmove', (event) => {
										if (event.touches.length !== 2 || !this.initialDistance || !this.initialScale) return;

										event.preventDefault();

										const currentDistance = getDistance(event.touches);
										const ratio = currentDistance / this.initialDistance;

										let newScale = this.initialScale.x * ratio;

										newScale = Math.max(this.data.min, Math.min(this.data.max, newScale));

										this.el.object3D.scale.set(newScale, newScale, newScale);
								}, { passive: false });

								sceneEl.addEventListener('touchend', () => {
										this.initialDistance = null;
										this.initialScale = null;
								});
						}
				});
		</script>
	</body>
</html>
