<!doctype html>
<html>
	<head>
		<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
		<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
	</head>

	<body style="margin: 0; overflow: hidden; touch-action: none;">
		<a-scene
				vr-mode-ui="enabled: false;"
				loading-screen="enabled: false;"
				arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
				id="scene"
				embedded
				gesture-detector
		>
		<a-assets>
				<img id="png-asset" src="assets/asset.png">
		</a-assets>

		<a-marker
			id="animated-marker"
			type="pattern"
			preset="custom"
			url="assets/marker.patt"
			raycaster="objects: .clickable"
			emitevents="true"
			cursor="fuse: false; rayOrigin: mouse;"
		>
		<a-plane
				id="ar-image"
				class="clickable"
				material="src: #png-asset; transparent: true"
				rotation="-90 0 0"
				keep-image-aspect="baseHeight: 1.5"
				gesture-handler="minScale: 0.3; maxScale: 5; rotationFactor: 5"
		></a-plane>
		</a-marker>

		<a-entity camera></a-entity>
			</a-scene>

		<script>
				AFRAME.registerComponent('gesture-handler', {
						schema: {
								enabled: { default: true },
								rotationFactor: { default: 5 },
								minScale: { default: 0.3 },
								maxScale: { default: 5 }
						},

						init: function () {
								this.handleScale = this.handleScale.bind(this);
								this.handleRotation = this.handleRotation.bind(this);

								this.el.sceneEl.addEventListener('twofingermove', this.handleScale);
								this.el.sceneEl.addEventListener('onefingermove', this.handleRotation);
						},

						remove: function () {
								this.el.sceneEl.removeEventListener('twofingermove', this.handleScale);
								this.el.sceneEl.removeEventListener('onefingermove', this.handleRotation);
						},

						handleRotation: function (event) {
								if (!this.data.enabled) return;

								const deltaX = event.detail.positionChange.x;
								const deltaY = event.detail.positionChange.y;

								this.el.object3D.rotation.y += deltaX * this.data.rotationFactor;

								this.el.object3D.rotation.x += deltaY * this.data.rotationFactor;
						},

						handleScale: function (event) {
								if (!this.data.enabled) return;
								if (!event.detail.spreadChange) return;

								const currentScale = this.el.object3D.scale.x;

								let newScale = currentScale + event.detail.spreadChange / 200;

								newScale = Math.max(
										this.data.minScale,
										Math.min(this.data.maxScale, newScale)
								);

								this.el.object3D.scale.set(newScale, newScale, newScale);
						}
				});

				AFRAME.registerComponent('keep-image-aspect', {
				schema: {
						baseHeight: { type: 'number', default: 1 }
				},

				init: function () {
						const el = this.el;
						const img = document.querySelector('#png-asset');

						const applyAspect = () => {
								const naturalWidth = img.naturalWidth;
								const naturalHeight = img.naturalHeight;

								const aspect = naturalWidth / naturalHeight;
								const baseHeight = this.data.baseHeight;
								const baseWidth = baseHeight * aspect;

								console.log('画像サイズ:', naturalWidth, naturalHeight);
								console.log('表示サイズ:', baseWidth, baseHeight);

								el.setAttribute('geometry', {
										primitive: 'plane',
										width: baseWidth,
										height: baseHeight
								});

								el.setAttribute('material', {
										src: '#png-asset',
										transparent: true
								});

								el.object3D.scale.set(1, 1, 1);
						};

						if (img.complete && img.naturalWidth) {
								applyAspect();
						} else {
								img.addEventListener('load', applyAspect);
						}
				}
		});
		</script>
	</body>
</html>
