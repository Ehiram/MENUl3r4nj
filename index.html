<!doctype html>
<html>
	<head>
		<script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
		<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-detector.js"></script>
		<script src="https://raw.githack.com/AR-js-org/studio-backend/master/src/modules/marker/tools/gesture-handler.js"></script>
	</head>

	<body style="margin: 0; overflow: hidden; touch-action: none;">
		<a-scene
				vr-mode-ui="enabled: false;"
				loading-screen="enabled: false;"
				arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
				id="scene"
				embedded
		>
		<a-assets>
				<img id="png-asset" src="assets/asset.png">
		</a-assets>

		<a-marker
			id="animated-marker"
			type="pattern"
			preset="custom"
			url="assets/marker.patt"
			raycaster="objects: .clickable"
			emitevents="true"
			cursor="fuse: false; rayOrigin: mouse;"
		>
		<a-image
			id="ar-image"
			src="#png-asset"
			class="clickable"
			rotation="-90 0 0"
			keep-image-aspect
			ar-touch-control="minScale: 0.3; maxScale: 5; rotateSpeed: 0.5"
		></a-image>
		</a-marker>

		<a-entity camera></a-entity>
			</a-scene>

		<script>
				AFRAME.registerComponent('keep-image-aspect', {
						init: function () {
								const el = this.el;
								const src = el.getAttribute('src');

								let img;

								if (src && src.startsWith('#')) {
										img = document.querySelector(src);
								} else {
										img = new Image();
										img.src = src;
								}

								const applyAspect = () => {
										const width = img.naturalWidth;
										const height = img.naturalHeight;

										if (!width || !height) return;

										const aspect = width / height;

										// 高さを1にして、幅を画像の比率に合わせる
										el.setAttribute('height', 1);
										el.setAttribute('width', aspect);

										// 初期サイズ
										el.object3D.scale.set(1, 1, 1);
								};

								if (img.complete) {
										applyAspect();
								} else {
										img.addEventListener('load', applyAspect);
								}
						}
				});


				AFRAME.registerComponent('ar-touch-control', {
						schema: {
								minScale: { type: 'number', default: 0.3 },
								maxScale: { type: 'number', default: 5 },
								rotateSpeed: { type: 'number', default: 0.5 }
						},

						init: function () {
								this.isOneFinger = false;
								this.isTwoFinger = false;

								this.lastX = null;

								this.startDistance = null;
								this.startScale = null;

								const el = this.el;

								const getDistance = (touches) => {
										const dx = touches[0].clientX - touches[1].clientX;
										const dy = touches[0].clientY - touches[1].clientY;
										return Math.sqrt(dx * dx + dy * dy);
								};

								const onTouchStart = (event) => {
										if (!el.object3D.visible) return;

										if (event.touches.length === 1) {
												this.isOneFinger = true;
												this.isTwoFinger = false;
												this.lastX = event.touches[0].clientX;
										}

										if (event.touches.length === 2) {
												event.preventDefault();

												this.isOneFinger = false;
												this.isTwoFinger = true;

												this.startDistance = getDistance(event.touches);
												this.startScale = el.object3D.scale.x;
										}
								};

								const onTouchMove = (event) => {
										if (!el.object3D.visible) return;

										// rotate
										if (event.touches.length === 1 && this.isOneFinger) {
												event.preventDefault();

												const currentX = event.touches[0].clientX;
												const deltaX = currentX - this.lastX;

												el.object3D.rotation.z -= THREE.MathUtils.degToRad(
														deltaX * this.data.rotateSpeed
												);

												this.lastX = currentX;
										}

										// zoom
										if (
												event.touches.length === 2 &&
												this.isTwoFinger &&
												this.startDistance &&
												this.startScale
										) {
												event.preventDefault();

												const currentDistance = getDistance(event.touches);
												const scaleRatio = currentDistance / this.startDistance;

												let newScale = this.startScale * scaleRatio;

												newScale = Math.max(
														this.data.minScale,
														Math.min(this.data.maxScale, newScale)
												);

												el.object3D.scale.set(newScale, newScale, newScale);
										}
								};

								const onTouchEnd = (event) => {
										if (event.touches.length === 0) {
												this.isOneFinger = false;
												this.isTwoFinger = false;
												this.lastX = null;
												this.startDistance = null;
												this.startScale = null;
										}

										if (event.touches.length === 1) {
												this.isOneFinger = true;
												this.isTwoFinger = false;
												this.lastX = event.touches[0].clientX;
												this.startDistance = null;
												this.startScale = null;
										}
								};

								document.addEventListener('touchstart', onTouchStart, {
										passive: false,
										capture: true
								});

								document.addEventListener('touchmove', onTouchMove, {
										passive: false,
										capture: true
								});

								document.addEventListener('touchend', onTouchEnd, {
										passive: false,
										capture: true
								});

								this.removeListeners = () => {
										document.removeEventListener('touchstart', onTouchStart, true);
										document.removeEventListener('touchmove', onTouchMove, true);
										document.removeEventListener('touchend', onTouchEnd, true);
								};
						},

						remove: function () {
								if (this.removeListeners) {
										this.removeListeners();
								}
						}
				});
		</script>
	</body>
</html>
